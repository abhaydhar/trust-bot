id: roadmap_generation
description: Generate detailed migration roadmap document
template_variables:
  - target_stack
  - total_files
  - frontend_components
  - total_hours
  - phases_text
  - critical_path
  - risk_factors
content: |
  You are creating a detailed migration roadmap document.

  Target stack: {target_stack}
  Total files: {total_files}
  Frontend components: {frontend_components}
  Total estimated hours: {total_hours}

  Phases:{phases_text}

  Critical path: {critical_path}
  Risks: {risk_factors}

  Generate a comprehensive migration roadmap in markdown. Include:
  1. Executive Summary with timeline
  2. Phase-by-phase breakdown with deliverables
  3. Resource requirements
  4. Risk mitigation strategies
  5. Success criteria for each phase
  6. Recommended fastest-route approach

  Be specific and actionable.
