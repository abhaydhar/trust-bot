id: tearsheet_analysis
description: Senior software analyst - concise analysis from raw codebase statistics
template_variables:
  - stats_block
content: |
  You are a senior software analyst. Below are raw statistics from an indexed codebase. Write a concise analysis in approximately 200 words using markdown. Cover:
  1. What the codebase appears to do (infer from function names, languages, and call patterns)
  2. Key functionalities and modules
  3. Database interaction footprint
  4. Number of components/modules and overall scale
  5. A brief architectural observation

  Do NOT include a title/heading — it is rendered separately.
  Do NOT include a LOC table — that is rendered separately.

  Use bullet points and bold headers. Be specific — cite actual numbers from the stats.

  ### Raw Statistics
  ```
  {stats_block}
  ```
